<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>재고 대시보드</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>📦 실시간 재고 대시보드</h1>
  <div class="meta">
    <span id="updated">-</span>
    <button id="refresh">🔄 새로고침</button>
  </div>
</header>

<section class="cards">
  <div class="card"><div class="label">총 품목 수</div><div class="value" id="stat-items">-</div></div>
  <div class="card"><div class="label">총 재고 수량</div><div class="value" id="stat-qty">-</div></div>
  <div class="card warning"><div class="label">⚠️ 안전재고 미달</div><div class="value" id="stat-low">-</div></div>
  <div class="card"><div class="label">창고 수</div><div class="value" id="stat-wh">-</div></div>
</section>

<section class="controls">
  <input type="text" id="search" placeholder="🔍 품번/품명/분류 검색...">
  <select id="wh-filter"><option value="">전체 창고</option></select>
  <select id="class-filter"><option value="">전체 분류</option></select>
  <label><input type="checkbox" id="low-only"> 안전재고 미달만</label>
</section>

<section>
  <table id="inv">
    <thead>
      <tr>
        <th data-sort="prod_cd">품번</th>
        <th data-sort="prod_des">품명</th>
        <th data-sort="class_name">분류</th>
        <th data-sort="wh_des">창고</th>
        <th data-sort="qty" class="num">재고</th>
        <th data-sort="safe_qty" class="num">안전재고</th>
        <th>단위</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="8" class="empty">불러오는 중...</td></tr></tbody>
  </table>
</section>

<footer>데이터 출처: 이카운트 ERP · <span id="count">0</span> 건 표시 중</footer>

<script src="app.js"></script>
</body>
</html>
