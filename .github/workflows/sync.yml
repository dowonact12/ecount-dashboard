name: Sync Ecount Inventory

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 (GitHub Actions 최소 권장)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: sync-inventory
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch inventory from Ecount
        env:
          ECOUNT_COM_CODE: ${{ secrets.ECOUNT_COM_CODE }}
          ECOUNT_USER_ID: ${{ secrets.ECOUNT_USER_ID }}
          ECOUNT_API_CERT_KEY: ${{ secrets.ECOUNT_API_CERT_KEY }}
          ECOUNT_LAN_TYPE: 'ko-KR'
        run: python fetch_inventory.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/inventory.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "auto: sync inventory $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
